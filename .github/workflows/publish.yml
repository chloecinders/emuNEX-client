name: Publish

on:
    push:
        tags:
            - "v*"

jobs:
    publish:
        permissions:
            contents: write
        runs-on: ${{ matrix.platform }}
        strategy:
            fail-fast: false
            matrix:
                platform: [macos-latest, ubuntu-22.04, windows-latest]
        steps:
            - uses: actions/checkout@v4

            - name: install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: "pnpm"

            - name: install rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: cargo cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      src-tauri/target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-

            - name: install dependencies (ubuntu only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libgtk-3-dev \
                    libwebkit2gtk-4.1-dev \
                    libsoup-3.0-dev \
                    libjavascriptcoregtk-4.1-dev \
                    libappindicator3-dev \
                    librsvg2-dev \
                    patchelf

            - name: install frontend dependencies
              run: pnpm install

            - name: build tauri
              run: pnpm tauri build
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

            - name: release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: "emuNex Client ${{ github.ref_name }}"
                  body: "See the assets below for the latest installers."
                  draft: true
                  files: |
                      src-tauri/target/release/bundle/msi/*.msi
                      src-tauri/target/release/bundle/msi/*.msi.zip*
                      src-tauri/target/release/bundle/dmg/*.dmg
                      src-tauri/target/release/bundle/appimage/*.AppImage
                      src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz*

    updater:
        needs: publish
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4

            - name: generate latest.json
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG=${{ github.ref_name }}
                  REPO=${{ github.repository }}

                  RELEASE_DATA=$(gh api repos/$REPO/releases)
                  ASSETS=$(echo "$RELEASE_DATA" | jq -r ".[] | select(.tag_name==\"$TAG\") | .assets")

                  if [ -z "$ASSETS" ] || [ "$ASSETS" == "null" ]; then
                    echo "Could not find assets for tag $TAG"
                    exit 1
                  fi

                  get_url() { echo "$ASSETS" | jq -r ".[] | select(.name | test(\"$1\")) | .url"; }
                  get_sig() {
                    SIG_URL=$(get_url "$1")
                    if [ -n "$SIG_URL" ]; then
                      curl -sL -H "Authorization: Bearer $GH_TOKEN" "$SIG_URL"
                    fi
                  }

                  cat <<EOF > latest.json
                  {
                    "version": "$TAG",
                    "notes": "Release $TAG",
                    "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                    "platforms": {
                      "darwin-x86_64": {
                        "signature": "$(get_sig "x64.dmg.sig")",
                        "url": "$(get_url "x64.dmg")"
                      },
                      "darwin-aarch64": {
                        "signature": "$(get_sig "aarch64.dmg.sig")",
                        "url": "$(get_url "aarch64.dmg")"
                      },
                      "linux-x86_64": {
                        "signature": "$(get_sig "AppImage.tar.gz.sig")",
                        "url": "$(get_url "AppImage.tar.gz")"
                      },
                      "windows-x86_64": {
                        "signature": "$(get_sig "x64_en-US.msi.zip.sig")",
                        "url": "$(get_url "x64_en-US.msi.zip")"
                      }
                    }
                  }
                  EOF

            - name: upload latest.json to release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release upload ${{ github.ref_name }} latest.json --clobber
